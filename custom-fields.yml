- keyname: message
  field_type: long_text
  name: "Sign Message"
  description: "The main text to display on your sign"
  placeholder: "Hello, World!"

- keyname: subtitle
  field_type: text
  name: "Subtitle"
  description: "Optional secondary line (e.g. '- The Management')"
  optional: true

- keyname: font_style
  field_type: select
  name: "Font Style"
  default: classic
  options:
    - classic
    - bold
    - compact
    - marquee

- keyname: border_style
  field_type: select
  name: "Border Style"
  default: none
  options:
    - none
    - simple
    - double
    - dashed
    - thick

- keyname: text_align
  field_type: select
  name: "Text Alignment"
  default: center
  options:
    - center
    - left
    - right

- keyname: sign_theme
  field_type: select
  name: "Sign Theme"
  default: standard
  options:
    - standard
    - notice_board
    - minimalist
    - retro

- keyname: show_date
  field_type: select
  name: "Show Date on Sign"
  default: "no"
  options:
    - "no"
    - "yes"

- keyname: qr_url
  field_type: url
  name: "QR Code URL"
  description: "Optional URL to display as a scannable QR code on your sign"
  optional: true

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Sign board -->
  <rect x="14" y="16" width="100" height="68" rx="4" ry="4" fill="white" stroke="black" stroke-width="4"/>
  <!-- Inner border (retro style) -->
  <rect x="22" y="24" width="84" height="52" rx="2" ry="2" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Text lines -->
  <line x1="36" y1="42" x2="92" y2="42" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="54" x2="84" y2="54" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="64" x2="78" y2="64" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Post -->
  <rect x="58" y="84" width="12" height="32" fill="black" rx="2" ry="2"/>
  <!-- Ground line -->
  <line x1="40" y1="116" x2="88" y2="116" stroke="black" stroke-width="3" stroke-linecap="round"/>
</svg>
